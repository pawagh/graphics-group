name: Update Publications

on:
  schedule:
    - cron: '0 0 1 */2 *'  # Every 2 months
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Fetch and enrich publications
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SEMANTIC_SCHOLAR_API_KEY: ${{ secrets.SEMANTIC_SCHOLAR_API_KEY }}
        run: npx tsx scripts/update-publications.ts

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/publications.json public/papers/
          git diff --staged --quiet || git commit -m "chore(publications): auto-update $(date +'%Y-%m-%d')"
          git push
